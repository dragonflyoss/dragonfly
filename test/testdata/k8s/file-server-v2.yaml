---
apiVersion: v1
kind: Namespace
metadata:
  name: dragonfly-e2e

---
apiVersion: v1
kind: Service
metadata:
  name: file-server-v2
  namespace: dragonfly-e2e
spec:
  selector:
    app: dragonfly
    component: file-server-v2
  type: ClusterIP
  ports:
  - name: server
    port: 80
    protocol: TCP
    targetPort: 5000

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: file-server-v2
  namespace: dragonfly-e2e
spec:
  serviceName: file-server-v2
  selector:
    matchLabels:
      app: dragonfly
      component: file-server-v2
  replicas: 1
  template:
    metadata:
      labels:
        app: dragonfly
        component: file-server-v2
    spec:
      containers:
      - name: dufs
        image: sigoden/dufs
        command: ["dufs","/data","-A"]
        imagePullPolicy: "IfNotPresent"
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        hostPath:
          path: /tmp/e2e-file-server
